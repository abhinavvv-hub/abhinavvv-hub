      <rect x="160" y="58" width="235" height="8" rx="4" fill="#363a4f" opacity="0.55"/>
      <rect x="160" y="58" width="200" height="8" rx="4" fill="url(#bar-2)" opacity="0.92"/>
      <text x="410" y="64" class="term-text" font-size="12" fill="#c6a0f6" font-weight="700">85%</text>

      <!-- Bar 3 -->
