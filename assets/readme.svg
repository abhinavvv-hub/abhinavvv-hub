<svg width="1000" height="650" viewBox="0 0 1000 650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&amp;display=swap');
      
      * {
        font-family: 'JetBrains Mono', monospace;
      }
      .waybar-text { font-size: 12px; fill: #cdd6f4; font-weight: 700; }
      .term-title { font-size: 14px; fill: #f38ba8; font-weight: 700; }
      .term-text { font-size: 13px; fill: #a6adc8; }
      .term-highlight { fill: #cba6f7; font-weight: 700; }
      .term-prompt { fill: #a6e3a1; font-weight: 700; }
      .term-dir { fill: #89b4fa; font-weight: 700; }
      .ascii-art { font-size: 10px; fill: #f5c2e7; white-space: pre; }
    </style>

    <!-- Glowing Background Filters -->
    <filter id="blur-heavy" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="80" />
    </filter>
    
    <!-- Window Drop Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.6"/>
    </filter>

    <!-- Window Border Gradients -->
    <linearGradient id="border-active" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f38ba8" />
      <stop offset="50%" stop-color="#cba6f7" />
      <stop offset="100%" stop-color="#89b4fa" />
    </linearGradient>
    
    <linearGradient id="border-inactive" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a6e3a1" />
      <stop offset="100%" stop-color="#94e2d5" />
    </linearGradient>
  </defs>

  <!-- ================= BACKGROUND ================= -->
  <!-- Base Dark -->
  <rect width="1000" height="650" fill="#11111b" />
  
  <!-- Abstract Anime/Vibrant Glows (Mimicking the screenshot's color palette) -->
  <circle cx="200" cy="150" r="150" fill="#f38ba8" opacity="0.3" filter="url(#blur-heavy)" />
  <circle cx="800" cy="500" r="200" fill="#cba6f7" opacity="0.25" filter="url(#blur-heavy)" />
  <circle cx="850" cy="100" r="120" fill="#89b4fa" opacity="0.2" filter="url(#blur-heavy)" />
  <circle cx="100" cy="550" r="180" fill="#f5c2e7" opacity="0.2" filter="url(#blur-heavy)" />

  <!-- ================= WAYBAR (TOP BAR) ================= -->
  <rect x="10" y="10" width="980" height="26" rx="6" fill="#1e1e2e" opacity="0.85" stroke="#313244" stroke-width="1"/>
  
  <!-- Workspaces -->
  <rect x="20" y="15" width="24" height="16" rx="8" fill="#cba6f7" />
  <rect x="48" y="17" width="12" height="12" rx="6" fill="#45475a" />
  <rect x="64" y="17" width="12" height="12" rx="6" fill="#45475a" />
  <rect x="80" y="17" width="12" height="12" rx="6" fill="#45475a" />
  <rect x="96" y="17" width="12" height="12" rx="6" fill="#45475a" />

  <!-- Center Status -->
  <text x="500" y="28" class="waybar-text" text-anchor="middle">  16:44:00  |    Sat, 11 Jul</text>
  
  <!-- Right Status -->
  <text x="970" y="28" class="waybar-text" text-anchor="end"> 12%   4.2G  |    Abhinav_5G  |   80%</text>

  <!-- ================= WINDOW 1: NEOFETCH (Top Left) ================= -->
  <!-- Shadow & Border -->
  <rect x="20" y="55" width="465" height="300" rx="10" fill="#181825" opacity="0.85" stroke="url(#border-active)" stroke-width="2" filter="url(#shadow)"/>
  
  <!-- Title bar buttons -->
  <circle cx="40" cy="75" r="5" fill="#f38ba8" />
  <circle cx="55" cy="75" r="5" fill="#f9e2af" />
  <circle cx="70" cy="75" r="5" fill="#a6e3a1" />
  <text x="252" y="80" class="term-title" text-anchor="middle">kitty - neofetch</text>

  <!-- Neofetch Content -->
  <g transform="translate(40, 115)">
    <!-- ASCII Art (Left) -->
    <text class="ascii-art" y="10">
       /\_/\
      ( o.o )
       &gt; ^ &lt;
      /  |  \
     /___|___\
    </text>
    
    <!-- Info (Right) -->
    <g transform="translate(130, 0)">
      <text class="term-highlight" y="10">abhinav<tspan fill="#cdd6f4">@</tspan>hyprland</text>
      <text class="term-text" y="22">-----------------</text>
      
      <text class="term-highlight" y="45">OS<tspan fill="#cdd6f4">:</tspan> <tspan class="term-text">Software Engineer</tspan></text>
      <text class="term-highlight" y="65">Host<tspan fill="#cdd6f4">:</tspan> <tspan class="term-text">B.Tech @ BIT Mesra</tspan></text>
      <text class="term-highlight" y="85">Kernel<tspan fill="#cdd6f4">:</tspan> <tspan class="term-text">B.Sc.(Hons.) @ IIT Guwahati</tspan></text>
      <text class="term-highlight" y="105">Uptime<tspan fill="#cdd6f4">:</tspan> <tspan class="term-text">Learning Continuously</tspan></text>
      <text class="term-highlight" y="125">Shell<tspan fill="#cdd6f4">:</tspan> <tspan class="term-text">C++, Python, Java, JS, SQL</tspan></text>
      <text class="term-highlight" y="145">Theme<tspan fill="#cdd6f4">:</tspan> <tspan class="term-text">Quantitative Finance</tspan></text>
      <text class="term-highlight" y="165">WM<tspan fill="#cdd6f4">:</tspan> <tspan class="term-text">Competitive Programming</tspan></text>
      
      <!-- Color Blocks -->
      <g transform="translate(0, 195)">
        <rect x="0" y="0" width="12" height="12" fill="#45475a"/>
        <rect x="15" y="0" width="12" height="12" fill="#f38ba8"/>
        <rect x="30" y="0" width="12" height="12" fill="#a6e3a1"/>
        <rect x="45" y="0" width="12" height="12" fill="#f9e2af"/>
        <rect x="60" y="0" width="12" height="12" fill="#89b4fa"/>
        <rect x="75" y="0" width="12" height="12" fill="#cba6f7"/>
        <rect x="90" y="0" width="12" height="12" fill="#94e2d5"/>
        <rect x="105" y="0" width="12" height="12" fill="#bac2de"/>
      </g>
    </g>
  </g>

  <!-- ================= WINDOW 2: DIRECTORY / PROFILES (Top Right) ================= -->
  <rect x="515" y="55" width="465" height="300" rx="10" fill="#181825" opacity="0.85" stroke="url(#border-inactive)" stroke-width="1.5" filter="url(#shadow)"/>
  
  <text x="747" y="80" class="term-title" text-anchor="middle" fill="#a6e3a1">kitty - zsh</text>

  <g transform="translate(535, 115)">
    <text y="10"><tspan class="term-prompt">➜</tspan> <tspan class="term-dir">~</tspan> <tspan class="term-text">ls -la Profiles/</tspan></text>
    
    <text class="term-text" y="40">drwxr-xr-x  1 abhinav devs  4096 Jul 11 07:38 <tspan class="term-dir">.</tspan></text>
    <text class="term-text" y="60">drwxr-xr-x 42 abhinav devs  4096 Jul 11 07:38 <tspan class="term-dir">..</tspan></text>
    
    <text class="term-text" y="90">-rw-r--r--  1 abhinav devs   256 Jul 11 07:38 <tspan class="term-highlight">GitHub.md</tspan></text>
    <text class="term-text" y="110">-rw-r--r--  1 abhinav devs   256 Jul 11 07:38 <tspan class="term-highlight">LinkedIn.md</tspan></text>
    <text class="term-text" y="130">-rw-r--r--  1 abhinav devs   256 Jul 11 07:38 <tspan class="term-highlight">LeetCode.md</tspan></text>
    <text class="term-text" y="150">-rw-r--r--  1 abhinav devs   256 Jul 11 07:38 <tspan class="term-highlight">Codeforces.md</tspan></text>
    <text class="term-text" y="170">-rw-r--r--  1 abhinav devs   256 Jul 11 07:38 <tspan class="term-highlight">CodeChef.md</tspan></text>
    
    <text y="210"><tspan class="term-prompt">➜</tspan> <tspan class="term-dir">~</tspan> <tspan class="term-text">cat Research.txt</tspan></text>
    <text class="term-text" y="235">"Hermite Wavelet Solution of Singularly Perturbed BVPs"</text>
  </g>

  <!-- ================= WINDOW 3: BTOP / SKILLS (Bottom Full Width) ================= -->
  <rect x="20" y="380" width="960" height="250" rx="10" fill="#181825" opacity="0.85" stroke="#89b4fa" stroke-width="1.5" filter="url(#shadow)"/>
  
  <text x="500" y="405" class="term-title" text-anchor="middle" fill="#89b4fa">kitty - btop</text>

  <!-- Left Side: Focus Bars (Mimicking CPU usage bars in btop) -->
  <g transform="translate(40, 435)">
    <rect x="0" y="-15" width="420" height="200" fill="none" stroke="#313244" stroke-width="1" rx="5"/>
    <text class="term-highlight" x="10" y="5" font-size="12">┌ Focus / Allocation ────────────────────────────</text>
    
    <!-- Software Engineering -->
    <text class="term-text" x="20" y="35">Software Eng.</text>
    <text class="term-text" x="140" y="35" fill="#f38ba8">[|||||||||||||||||||||||||||||| 95%]</text>
    
    <!-- Competitive Programming -->
    <text class="term-text" x="20" y="70">Comp. Prog.</text>
    <text class="term-text" x="140" y="70" fill="#cba6f7">[||||||||||||||||||||||||||     85%]</text>

    <!-- Quantitative Finance -->
    <text class="term-text" x="20" y="105">Quant Finance</text>
    <text class="term-text" x="140" y="105" fill="#89b4fa">[||||||||||||||||||||           75%]</text>

    <!-- Machine Learning -->
    <text class="term-text" x="20" y="140">Machine Lrn.</text>
    <text class="term-text" x="140" y="140" fill="#a6e3a1">[||||||||||||||                 60%]</text>
  </g>

  <!-- Right Side: Domains & Sub-skills (Mimicking memory/processes in btop) -->
  <g transform="translate(480, 435)">
    <rect x="0" y="-15" width="460" height="200" fill="none" stroke="#313244" stroke-width="1" rx="5"/>
    <text class="term-highlight" x="10" y="5" font-size="12">┌ Active Threads ────────────────────────────────</text>
    
    <!-- Table Header -->
    <text class="term-highlight" x="20" y="35" font-size="12" fill="#f38ba8">PID   USER      DOMAIN           STATUS      TIME</text>
    
    <!-- Table Content -->
    <text class="term-text" x="20" y="60">1024  abhinav   System Design    Running     14:20</text>
    <text class="term-text" x="20" y="85">2048  abhinav   Low Latency Sys  Running     08:45</text>
    <text class="term-text" x="20" y="110">4096  root      Data Structures  Sleeping    99:99</text>
    <text class="term-text" x="20" y="135">8192  abhinav   Deep Learning    Running     05:30</text>
    
    <!-- Footer / Selectors -->
    <text class="term-text" x="20" y="170" font-size="11" fill="#6c7086">&lt;F1&gt; Help  &lt;F2&gt; Setup  &lt;F3&gt; Search  &lt;F4&gt; Filter</text>
  </g>

</svg>
