<svg width="100%" height="100%" viewBox="0 0 1000 650" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" style="max-width: 960px; display: block; margin: 0 auto; background: #0d0d1a; border-radius: 16px; font-family: 'JetBrains Mono', 'Courier New', monospace;">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&amp;display=swap');
      
      text, a text { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      
      .waybar-text { font-size: 11px; fill: #a6adc8; font-weight: 500; }
      .waybar-accent { font-size: 11px; font-weight: 700; }
      .term-title { font-size: 13px; fill: #f5a97f; font-weight: 700; letter-spacing: 0.5px; }
      .term-text { font-size: 12.5px; fill: #cad3f5; font-weight: 400; }
      .term-muted { font-size: 12px; fill: #6e738d; font-weight: 400; }
      .term-highlight { fill: #c6a0f6; font-weight: 700; }
      .term-prompt { fill: #a6da95; font-weight: 700; font-size: 13px; }
      .term-dir { fill: #8aadf4; font-weight: 700; }
      .term-accent { fill: #f5a97f; font-weight: 700; }
      .term-pink { fill: #f5bde6; font-weight: 700; }
      .term-green { fill: #a6da95; font-weight: 700; font-size: 11px; }
      .ascii-art { font-size: 9px; fill: #b7bdf8; white-space: pre; font-weight: 700; letter-spacing: 0.5px; }
      .table-header { font-size: 11px; font-weight: 700; }
      .table-cell { font-size: 11px; font-weight: 400; }
      
      /* Project listing styles */
      .project-dot { font-weight: 700; font-size: 11px; }
      .project-name { font-size: 12px; font-weight: 700; }
      .project-desc { font-size: 12px; fill: #b8c0e0; }
      
      .card { transition: filter 0.35s ease; cursor: default; }
      .card:hover { filter: brightness(1.08) drop-shadow(0 0 12px rgba(198, 160, 246, 0.25)); }
      .window-glow { transition: opacity 0.5s ease; }
      .card:hover .window-glow { opacity: 0.12; }
      
      @keyframes ambientPulse {
        0%, 100% { opacity: 0.07; }
        50% { opacity: 0.14; }
      }
      @keyframes softBlink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.35; }
      }
      .animate-ambient { animation: ambientPulse 4s ease-in-out infinite; }
    </style>

    <!-- Filters -->
    <filter id="blur-ambient" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="80" />
    </filter>
    <filter id="shadow-card" x="-6%" y="-6%" width="112%" height="112%">
      <feDropShadow dx="0" dy="10" stdDeviation="22" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <filter id="shadow-bar" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>

    <!-- Gradients -->
    <linearGradient id="border-w1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c6a0f6"/>
      <stop offset="45%" stop-color="#f5bde6"/>
      <stop offset="100%" stop-color="#8aadf4"/>
    </linearGradient>
    <linearGradient id="border-w2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a6da95"/>
      <stop offset="100%" stop-color="#8bd5ca"/>
    </linearGradient>
    <linearGradient id="border-w3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8aadf4"/>
      <stop offset="50%" stop-color="#c6a0f6"/>
      <stop offset="100%" stop-color="#f5a97f"/>
    </linearGradient>
    <linearGradient id="bar-1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ed8796"/>
      <stop offset="100%" stop-color="#f5a97f"/>
    </linearGradient>
    <linearGradient id="bar-2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c6a0f6"/>
      <stop offset="100%" stop-color="#8aadf4"/>
    </linearGradient>
    <linearGradient id="bar-3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8aadf4"/>
      <stop offset="100%" stop-color="#8bd5ca"/>
    </linearGradient>
    <linearGradient id="bar-4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a6da95"/>
      <stop offset="100%" stop-color="#eed49f"/>
    </linearGradient>

    <!-- Subtle Grid Pattern -->
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#cad3f5" stroke-width="0.4" opacity="0.04"/>
    </pattern>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect width="1000" height="650" fill="#0d0d1a" rx="16"/>
  <rect width="1000" height="650" fill="url(#grid)" rx="16"/>

  <!-- Ambient Glows -->
  <g class="animate-ambient">
    <circle cx="200" cy="120" r="180" fill="#ed8796" opacity="0.10" filter="url(#blur-ambient)"/>
    <circle cx="820" cy="500" r="200" fill="#c6a0f6" opacity="0.10" filter="url(#blur-ambient)"/>
    <circle cx="860" cy="90" r="150" fill="#8aadf4" opacity="0.09" filter="url(#blur-ambient)"/>
    <circle cx="70" cy="560" r="170" fill="#f5bde6" opacity="0.09" filter="url(#blur-ambient)"/>
    <circle cx="500" cy="320" r="220" fill="#a6da95" opacity="0.06" filter="url(#blur-ambient)"/>
  </g>

  <!-- ===== TOP BAR ===== -->
  <g filter="url(#shadow-bar)">
    <rect x="12" y="8" width="976" height="30" rx="9" fill="#181825" opacity="0.92" stroke="#313244" stroke-width="1"/>
  </g>
  
  <!-- Workspaces -->
  <g transform="translate(24, 15)">
    <rect x="0" y="0" width="30" height="18" rx="9" fill="#c6a0f6" opacity="0.85"/>
    <circle cx="40" cy="9" r="5" fill="#494d64" opacity="0.5"/>
    <circle cx="54" cy="9" r="5" fill="#494d64" opacity="0.5"/>
    <circle cx="68" cy="9" r="5" fill="#494d64" opacity="0.5"/>
    <circle cx="82" cy="9" r="5" fill="#494d64" opacity="0.5"/>
  </g>

  <!-- Center -->
  <text x="500" y="27" class="waybar-text" text-anchor="middle">
    <tspan class="waybar-accent" fill="#f5a97f"></tspan> 16:44  <tspan fill="#8bd5ca">│</tspan>  <tspan class="waybar-accent" fill="#a6da95"></tspan> Thu, 23 Jul
  </text>

  <!-- Right -->
  <text x="978" y="27" class="waybar-text" text-anchor="end">
    <tspan class="waybar-accent" fill="#ed8796"></tspan> 12%  <tspan class="waybar-accent" fill="#eed49f"></tspan> 4.2G  <tspan fill="#8bd5ca">│</tspan>  <tspan class="waybar-accent" fill="#8aadf4"></tspan> abhinavvv-hub  <tspan fill="#8bd5ca">│</tspan>  <tspan class="waybar-accent" fill="#c6a0f6"></tspan> 80%
  </text>

  <!-- ===== WINDOW 1 — NEOFETCH (Top Left) ===== -->
  <g class="card">
    <rect x="18" y="50" width="464" height="286" rx="12" fill="#181825" opacity="0.90" stroke="url(#border-w1)" stroke-width="1.5" filter="url(#shadow-card)"/>
    <rect x="18" y="50" width="464" height="286" rx="12" fill="url(#border-w1)" opacity="0.03" class="window-glow"/>
    
    <!-- Title bar -->
    <circle cx="40" cy="68" r="5" fill="#ed8796"/>
    <circle cx="56" cy="68" r="5" fill="#eed49f"/>
    <circle cx="72" cy="68" r="5" fill="#a6da95"/>
    <text x="250" y="72" class="term-title" text-anchor="middle">kitty — neofetch</text>

    <g transform="translate(38, 98)">
      <!-- ASCII Cat -->
      <text class="ascii-art" x="0" y="0">
        <tspan x="0" dy="0">  ╭─────╮</tspan>
        <tspan x="0" dy="13">  │◉  ◉│</tspan>
        <tspan x="0" dy="13">  │  △  │</tspan>
        <tspan x="0" dy="13">  ╰─┬┬─╯</tspan>
        <tspan x="0" dy="13">    ││</tspan>
        <tspan x="0" dy="13">   ╱  ╲</tspan>
        <tspan x="0" dy="13">  ╱    ╲</tspan>
      </text>

      <!-- Info -->
      <g transform="translate(115, 0)">
        <text y="8"><tspan class="term-highlight" font-size="14">abhinav</tspan><tspan class="term-muted" font-size="14">@</tspan><tspan class="term-pink" font-size="14">hyprland</tspan></text>
        <text y="23" class="term-muted">─────────────────</text>
        
        <text y="44"><tspan class="term-highlight">OS</tspan><tspan class="term-muted">     :</tspan> <tspan class="term-text">Windows 11, Pop OS!, Android 15</tspan></text>
        <text y="63"><tspan class="term-highlight">Uptime</tspan><tspan class="term-muted">   :</tspan> <tspan class="term-text">20 years, 8 months, 6 days</tspan></text>
