      <rect x="160" y="88" width="235" height="8" rx="4" fill="#363a4f" opacity="0.55"/>
      <rect x="160" y="88" width="212" height="8" rx="4" fill="url(#bar-3)" opacity="0.92"/>
      <text x="410" y="94" class="term-text" font-size="12" fill="#8aadf4" font-weight="700">90%</text>

      <!-- Bar 4 -->
