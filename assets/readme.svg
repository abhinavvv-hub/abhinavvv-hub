        <tspan class="project-name" fill="#c6a0f6"> Marine Unified Platform</tspan>
        <tspan class="project-desc"> — Data Lakehouse Architecture</tspan>
      </text>
      <text y="100">
        <tspan class="project-dot" fill="#8bd5ca">●</tspan>
        <tspan class="project-name" fill="#f5bde6"> FinMod</tspan>
        <tspan class="project-desc"> — Limit Order Book </tspan>
      </text>
      <text y="122">
