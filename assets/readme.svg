        <text x="130" y="102"> <tspan class="term-text">BSc @ IIT Guwahati</tspan> </text>
        <text y="120"><tspan class="term-highlight">Lang.</tspan><tspan class="term-muted">   :</tspan> <tspan class="term-text">C++, Python, Java, JS, SQL, LaTex</tspan></text>
        <text y="139"><tspan class="term-highlight">EMail</tspan><tspan class="term-muted">   :</tspan> <tspan class="term-text">abhinav.kr.1024@gmail.com</tspan></text>
        <text y="158"><tspan class="term-highlight">Interest</tspan><tspan class="term-muted">     :</tspan> <tspan class="term-text">Competitive Programming,</tspan></text>
        <text x="100" y="178"> <tspan class="term-text"> Quant Finance</tspan> </text>
        <!-- Color Palette -->
        <g transform="translate(0, 200)">
          <rect x="0" y="0" width="14" height="14" rx="3" fill="#494d64"/>
          <rect x="18" y="0" width="14" height="14" rx="3" fill="#ed8796"/>
          <rect x="36" y="0" width="14" height="14" rx="3" fill="#a6da95"/>
          <rect x="54" y="0" width="14" height="14" rx="3" fill="#eed49f"/>
          <rect x="72" y="0" width="14" height="14" rx="3" fill="#8aadf4"/>
          <rect x="90" y="0" width="14" height="14" rx="3" fill="#c6a0f6"/>
          <rect x="108" y="0" width="14" height="14" rx="3" fill="#8bd5ca"/>
          <rect x="126" y="0" width="14" height="14" rx="3" fill="#b8c0e0"/>
        </g>
      </g>
    </g>
  </g>

  <!-- ===== WINDOW 2 — PROJECTS (Top Right) ===== -->
