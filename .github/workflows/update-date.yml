name: Update Date & Time in README

on:
  schedule:
    # Runs at 18:30 UTC = 00:00 IST (midnight India time) every day
    - cron: '30 18 * * *'
  workflow_dispatch:   # allows manual trigger

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Replace date and time in SVG with current IST values
        run: |
          # Use Indian Standard Time
          export TZ='Asia/Kolkata'

          # Current time in "HH:MM" format (24-hour)
          TIME=$(date +"%H:%M")

          # Current date in "Sat, 11 Jul" format
          DATE=$(date +"%a, %d %b")

          # 1. Replace the time (located after the clock icon and before " │")
          sed -i "s/\(<\/tspan> \)[0-9][0-9]:[0-9][0-9]\(  │\)/\1$TIME\2/g" README.md

          # 2. Replace the date (located after the calendar icon)
          sed -i "s/\(<\/tspan> \)[A-Z][a-z][a-z], [0-9][0-9] [A-Z][a-z][a-z]/\1$DATE/g" README.md

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "🕒 Update date & time"
          git push
