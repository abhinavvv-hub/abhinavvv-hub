name: Update Date & Time in README

on:
  schedule:
    # Runs every 15 minutes (to keep the clock current)
    - cron: '*/15 * * * *'
  workflow_dispatch:   # manual trigger for testing

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Replace date and time with current IST
        run: |
          export TZ='Asia/Kolkata'
          TIME=$(date +"%H:%M")
          DATE=$(date +"%a, %d %b")

          # Replace the time (HH:MM) – located right after "</tspan> " and before "  <tspan"
          sed -i "s|\(</tspan> \)[0-9][0-9]:[0-9][0-9]\(  <tspan\)|\1$TIME\2|g" README.md

          # Replace the date (e.g. Sat, 11 Jul) – located after "</tspan> "
          sed -i "s|\(</tspan> \)[A-Z][a-z][a-z], [0-9][0-9] [A-Z][a-z][a-z]|\1$DATE|g" README.md

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "🕒 Update date & time"
          git push
